<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Hamdean</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.157.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.157.0/examples/jsm/"}}</script>
<style>
:root{--bg:#0f0f13;--srf:#1c1c24;--bd:#2a2a36;--tx:#e8e8ed;--t2:#8e8e9c;--t3:#5e5e6e;--a:#f0a346;--ag:linear-gradient(135deg,#f0a346,#f5c842);--font:'Inter',system-ui,sans-serif;--mono:'SF Mono','Cascadia Code',monospace}
*{margin:0;padding:0;box-sizing:border-box;min-width:0}::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:2px}::-webkit-scrollbar-corner{background:transparent}
body{-webkit-app-region:no-drag;}
input,textarea,button,a,select,.key-item,.chat-item,.model-tag,.mode-tag,.skill-item,.skill-toggle,.tbarbtn,.preset,.btn-primary,.btn-secondary,.btn-danger{-webkit-app-region:no-drag;pointer-events:auto;}
body{font-family:var(--font);background:var(--bg);color:var(--tx);height:100vh;display:flex;overflow:hidden}
.sidebar{width:220px;flex-shrink:0;background:#0b0b0f;display:flex;flex-direction:column;height:100vh;border-right:1px solid rgba(255,255,255,.04)}
.sb-head{padding:14px;display:flex;align-items:center;justify-content:space-between}
.sb-logo{display:flex;align-items:center;gap:8px}
.sb-icon{width:28px;height:28px;background:var(--ag);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#1a1a12}
.sb-name{font-size:14px;font-weight:700;color:#f0a346}
.btn-new{width:28px;height:28px;border-radius:6px;border:1px solid rgba(255,255,255,.06);background:transparent;color:#888;cursor:pointer;font-size:16px}
.btn-new:hover{background:#1a1a24;color:#fff}
.chat-list{flex:1;overflow-y:auto;padding:4px 8px}
.chat-item{display:flex;align-items:center;gap:6px;padding:8px 10px;border-radius:8px;cursor:pointer;font-size:12px;color:#7b7b8a;border:none;background:none;width:100%;text-align:left;font-family:var(--font)}
.chat-item:hover{background:#1a1a24;color:#ccc}
.chat-item.on{background:#22222e;color:#f0f0f0}
.chat-item .dot{width:4px;height:4px;border-radius:50%;background:#7b7b8a;opacity:.4;flex-shrink:0}
.chat-item.on .dot{background:#f0a346;opacity:1}
.chat-item .txt{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chat-item .del{opacity:0;width:18px;height:18px;border-radius:4px;border:none;background:transparent;color:#7b7b8a;cursor:pointer;font-size:9px;flex-shrink:0}
.chat-item:hover .del{opacity:.5}
.chat-item .del:hover{background:rgba(239,68,68,.2);color:#ef4444;opacity:1}
.sb-foot{padding:8px;border-top:1px solid rgba(255,255,255,.03);text-align:center;font-size:10px;color:rgba(255,255,255,.08)}
.main{flex:1;display:flex;flex-direction:column;height:100vh;min-width:0;overflow:hidden}
.tbar{height:40px;display:flex;align-items:center;justify-content:flex-end;padding:0 8px;gap:4px;-webkit-app-region:drag;flex-shrink:0}.tbar button{-webkit-app-region:no-drag}
.tbarbtn{height:26px;border-radius:6px;border:none;background:transparent;color:var(--t2);cursor:pointer;font-size:12px;padding:0 8px;display:flex;align-items:center;gap:4px}
.tbarbtn:hover{background:rgba(255,255,255,.04);color:var(--tx)}
.tbarbtn.danger:hover{background:#e81123;color:#fff}
.model-bar{display:flex;align-items:center;justify-content:center;padding:0 16px 6px;gap:8px;flex-shrink:0;overflow:hidden}
.model-tag{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:16px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--bd);background:transparent;color:var(--t3);font-family:var(--font);white-space:nowrap}
.model-tag.active{background:rgba(240,163,70,.08);color:#f0a346;border-color:rgba(240,163,70,.2)}
.model-tag .mdot{width:5px;height:5px;border-radius:50%;background:var(--t3)}
.model-tag.active .mdot{background:#22c55e}
.mode-tag{padding:4px 10px;border-radius:16px;font-size:10px;font-weight:600;cursor:pointer;border:1px solid rgba(255,255,255,.06);background:transparent;color:var(--t3);font-family:var(--font);white-space:nowrap}
.msgs{flex:1;overflow-y:auto;overflow-x:hidden;padding:12px 20px 16px;word-break:break-word;overflow-wrap:break-word}
.msgs::-webkit-scrollbar{width:4px}
.msgs::-webkit-scrollbar-thumb{background:rgba(255,255,255,.04);border-radius:4px}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px}
.empty-icon{width:56px;height:56px;border-radius:16px;background:rgba(240,163,70,.06);display:flex;align-items:center;justify-content:center;font-size:24px}
.empty-title{font-size:18px;font-weight:700}
.empty-sub{font-size:12px;color:var(--t3);text-align:center}
.msg{display:flex;gap:10px;padding:10px 0;animation:fadeIn .2s ease;min-width:0}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.msg-av{width:28px;height:28px;border-radius:8px;flex-shrink:0;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center}
.msg.user .msg-av{background:rgba(240,163,70,.12);color:#f0a346;border:1px solid rgba(240,163,70,.2)}
.msg.assistant .msg-av{background:var(--ag);color:#1a1a12}
.msg.system .msg-av{background:rgba(100,200,255,.12);color:#3b82f6;font-size:9px;border:1px solid rgba(59,130,246,.2)}
.msg.system .msg-content{font-size:11px;color:var(--t2);line-height:1.5;white-space:pre-wrap;font-family:var(--mono)}
.msg-bd{flex:1;min-width:0;overflow:hidden}
.msg-role{font-size:10px;font-weight:600;text-transform:uppercase;color:var(--t3);margin-bottom:3px}
.msg.user .msg-content{background:#0a0a0f;border-radius:16px 16px 4px 16px;padding:10px 14px;display:inline-block;max-width:100%;font-size:13px;line-height:1.6;color:#f0a346;border:1px solid #1a1a26;word-break:break-word;overflow-wrap:break-word}
.msg.assistant .msg-content{font-size:13px;line-height:1.75;color:var(--tx);word-break:break-word;overflow-wrap:break-word}
.msg.assistant .msg-content p{margin:0 0 8px}
.msg.assistant .msg-content pre{background:#000;border:1px solid #1a1a26;border-radius:8px;padding:12px 14px;overflow-x:auto;margin:0 0 8px;position:relative;color:#e0e0e0;font-size:12px;line-height:1.6;max-width:100%;white-space:pre-wrap;word-break:break-all}
.msg.assistant .msg-content code{background:#0a0a0f;padding:2px 5px;border-radius:4px;font-size:.85em;font-family:var(--mono);color:#f0a346;border:1px solid #1a1a26;word-break:break-all}
.msg.assistant .msg-content pre code{background:none;padding:0;border:none;color:#e0e0e0;white-space:pre-wrap}
.copy-btn{position:absolute;top:6px;right:6px;background:#1c1c24;border:1px solid #2a2a36;border-radius:4px;padding:2px 7px;font-size:9px;cursor:pointer;color:#8e8e9c;opacity:0;font-family:var(--font)}
.msg.assistant .msg-content pre:hover .copy-btn{opacity:1}
.input-area{padding:10px 20px 18px;flex-shrink:0;overflow:hidden}
.input-row{display:flex;align-items:flex-end;gap:5px;background:var(--srf);border-radius:16px;padding:5px;border:1px solid var(--bd);overflow:hidden}
.input-row:focus-within{border-color:#f0a346}
.input-row textarea{flex:1;border:none;background:transparent;padding:7px 8px;font-family:var(--font);font-size:13px;line-height:1.5;resize:none;outline:none;color:var(--tx);min-height:22px;max-height:140px;min-width:0}
.input-row textarea::placeholder{color:var(--t3)}
.key-btn{width:30px;height:30px;border-radius:8px;border:1px solid var(--bd);background:transparent;cursor:pointer;font-size:13px;color:var(--t2);position:relative;flex-shrink:0}
.key-btn.has-key{border-color:#f0a346;color:#f0a346}
.key-btn.has-key::after{content:'';position:absolute;top:-2px;right:-2px;width:7px;height:7px;border-radius:50%;background:#22c55e;border:2px solid var(--srf)}
.send-btn{width:36px;height:36px;border-radius:10px;border:none;background:var(--ag);color:#1a1a12;cursor:pointer;font-size:16px;flex-shrink:0;transition:.2s}
.send-btn:hover{transform:translateY(-1px)}
.send-btn:disabled{background:var(--bd);color:#555;cursor:not-allowed;transform:none}
.send-btn.running{background:linear-gradient(135deg,#ec4899,#f97316);color:#fff;animation:pulse 2s infinite}
@keyframes pulse{50%{box-shadow:0 0 0 8px rgba(236,72,153,.08)}}
.key-drop{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:340px;max-height:70vh;background:var(--srf);border:1px solid #f0a346;border-radius:14px;box-shadow:0 20px 60px rgba(0,0,0,.7);z-index:210;display:none;overflow:hidden}
.key-drop-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(2px);z-index:209;display:none}
.key-drop-head{padding:12px 14px 8px;font-size:10px;font-weight:700;text-transform:uppercase;color:var(--t3)}
.key-drop-list{max-height:220px;overflow-y:auto}
.key-item{display:flex;align-items:center;gap:8px;padding:9px 14px;cursor:pointer;border:none;background:none;width:100%;text-align:left;font-family:var(--font);color:var(--tx)}
.key-item:hover{background:#22222c}
.key-item.sel{background:rgba(240,163,70,.04)}
.key-item-dot{width:7px;height:7px;border-radius:50%;background:var(--t3);flex-shrink:0}
.key-item.sel .key-item-dot{background:#22c55e}
.key-item-info{flex:1;min-width:0}
.key-item-name{font-size:12px;font-weight:600}
.key-item-model{font-size:10px;color:var(--t3)}
.key-drop-add{padding:6px;border-top:1px solid var(--bd)}
.key-drop-add button{width:100%;padding:7px;border-radius:6px;border:1px dashed var(--bd);background:transparent;cursor:pointer;font-family:var(--font);font-size:11px;color:var(--t2)}
.key-drop-add button:hover{border-color:#f0a346;color:#f0a346}
.key-wrap{position:relative}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);z-index:200;display:none;align-items:center;justify-content:center}
.modal{background:var(--srf);border:1px solid var(--bd);border-radius:14px;width:92%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.modal-head{padding:16px 18px 10px;display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:14px;font-weight:650}
.modal-close{width:24px;height:24px;border-radius:6px;border:none;background:transparent;cursor:pointer;font-size:12px;color:var(--t3)}
.modal-body{padding:0 18px 14px;display:flex;flex-direction:column;gap:10px}
.field{display:flex;flex-direction:column;gap:3px}
.field label{font-size:9px;font-weight:700;text-transform:uppercase;color:var(--t2)}
.field input,.field select{width:100%;padding:8px 10px;border-radius:6px;border:1px solid var(--bd);background:#18181e;color:var(--tx);font-family:var(--font);font-size:12px;outline:none}
.field input:focus{border-color:#f0a346}
.modal-actions{padding:0 18px 14px;display:flex;gap:6px;justify-content:flex-end}
.btn-primary{padding:8px 16px;border-radius:6px;border:none;background:var(--ag);color:#1a1a12;font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer}
.btn-secondary{padding:8px 16px;border-radius:6px;border:1px solid var(--bd);background:transparent;font-family:var(--font);font-size:12px;cursor:pointer;color:var(--t2)}
.btn-secondary:hover{background:#22222c;color:var(--tx)}
.btn-danger{color:#ef4444;border-color:rgba(239,68,68,.2)}
.preset-row{display:flex;gap:4px;flex-wrap:wrap}
.preset{font-size:9px;padding:3px 7px;border-radius:10px;border:1px solid var(--bd);background:transparent;color:var(--t3);cursor:pointer;font-family:var(--font)}
.preset:hover{border-color:#f0a346;color:#f0a346}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#fff;color:#1c1c1c;padding:8px 18px;border-radius:16px;font-size:11px;font-weight:500;z-index:300;box-shadow:0 4px 12px rgba(0,0,0,.4)}
.status{display:flex;align-items:center;gap:6px;padding:4px 12px;font-size:11px;color:var(--t2)}
.status-dot{width:5px;height:5px;border-radius:50%;background:#f0a346;animation:dotPulse 1s infinite}
@keyframes dotPulse{50%{opacity:.3;transform:scale(.6)}}
.activity-line{display:flex;gap:8px;padding:2px 0;border-bottom:1px solid rgba(255,255,255,.02);font-size:10px;color:var(--t2)}
.activity-line .al-dot{width:5px;height:5px;border-radius:50%;margin-top:5px;flex-shrink:0}
.activity-line .al-time{color:var(--t3);flex-shrink:0;min-width:52px}
.activity-line .al-action{color:#22c55e;flex-shrink:0;min-width:70px}
.img-preview{position:relative;margin-bottom:8px;display:none}
.img-preview img{max-height:120px;max-width:100%;border-radius:8px;border:1px solid var(--bd)}
.img-remove{position:absolute;top:4px;right:4px;width:20px;height:20px;border-radius:50%;background:rgba(0,0,0,.7);color:#ef4444;border:none;cursor:pointer;font-size:10px}
.img-btn{width:30px;height:30px;border-radius:8px;border:1px solid var(--bd);background:transparent;cursor:pointer;font-size:16px;color:var(--t2);flex-shrink:0;display:flex;align-items:center;justify-content:center}
.img-btn:hover{border-color:#f0a346;color:#f0a346}
.img-btn.has-img{border-color:#22c55e;color:#22c55e}
.skill-item{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--bd)}
.skill-item:last-child{border-bottom:none}
.skill-info{flex:1;min-width:0}
.skill-name{font-size:12px;font-weight:600;color:var(--tx)}
.skill-prompt{font-size:10px;color:var(--t3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.skill-toggle{width:36px;height:20px;border-radius:10px;border:none;cursor:pointer;background:var(--bd);position:relative;flex-shrink:0;transition:.2s}
.skill-toggle.on{background:#22c55e}
.skill-toggle::after{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:#fff;transition:.2s}
.skill-toggle.on::after{left:18px}
.skill-edit-btn{background:none;border:none;color:var(--t3);cursor:pointer;font-size:11px;padding:2px 4px;flex-shrink:0}
.skill-edit-btn:hover{color:var(--tx)}
</style>
</head>
<body>
<!-- Login Screen -->
<div id="loginScreen" style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);z-index:99999;-webkit-app-region:no-drag;pointer-events:auto;">
  <!-- Titlebar for login screen -->
  <div style="position:fixed;top:0;left:0;right:0;height:40px;display:flex;align-items:center;justify-content:flex-end;gap:4px;padding:0 8px;z-index:999999;-webkit-app-region:drag;pointer-events:auto;">
  <span style="flex:1;-webkit-app-region:drag;"></span>
    <button class="tbarbtn" id="loginMin" style="-webkit-app-region:no-drag;">_</button><button class="tbarbtn" id="loginMax" style="-webkit-app-region:no-drag;">[]</button><button class="tbarbtn danger" id="loginClose" style="-webkit-app-region:no-drag;">X</button>
  </div>
  <div class="modal" style="max-width:380px;width:92%;">
    <div class="modal-head"><span class="modal-title" id="loginTitle">Login</span></div>
    <div class="modal-body">
      <div id="loginEmailView">
        <div class="field"><label>Email</label><input id="loginEmail" type="email" placeholder="you@example.com" autofocus></div>
        <div class="field"><label>Password</label><div style="position:relative;"><input id="loginPw" type="password" placeholder="Password" style="padding-right:36px;"><button type="button" onclick="togglePw('loginPw',this)" style="position:absolute;right:6px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--t3);cursor:pointer;font-size:14px;padding:2px 4px;">*</button></div></div>
        <div style="font-size:10px;color:var(--t3);margin-top:2px;"><a href="#" id="loginSwitchRegister" style="color:#f0a346;text-decoration:none;">Create account</a></div>
      </div>
      <div id="loginRegView" style="display:none;">
        <div class="field"><label>Email</label><input id="regEmail" type="email" placeholder="you@example.com"></div>
        <div class="field"><label>Password</label><div style="position:relative;"><input id="regPw" type="password" placeholder="Password (6+ chars)" style="padding-right:36px;"><button type="button" onclick="togglePw('regPw',this)" style="position:absolute;right:6px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--t3);cursor:pointer;font-size:14px;padding:2px 4px;">*</button></div></div>
        <div style="font-size:10px;color:var(--t3);margin-top:2px;"><a href="#" id="loginSwitchLogin" style="color:#f0a346;text-decoration:none;">Sign in instead</a></div>
      </div>
      <!-- Verification code -->
      <div id="loginVerifyView" style="display:none;">
        <div class="field"><label id="lblVerifyCode">验证码</label><input id="verifyCode" type="text" placeholder="6位验证码已发送到你的邮箱" maxlength="6"></div>
        <div style="font-size:10px;color:var(--t3);margin-top:2px;"><span id="verifyEmailText"></span> &middot; <a href="#" id="verifyResend" style="color:#f0a346;text-decoration:none;">重发</a> &middot; <a href="#" id="verifyBack" style="color:var(--t2);text-decoration:none;">返回</a></div>
      </div>
    </div>
    <div class="modal-actions"><button class="btn-primary" id="loginSubmit" style="width:100%;">Login</button></div>
    <div style="text-align:center;padding:0 18px 14px;font-size:10px;" id="loginError"></div>
  </div>
</div>
<!-- App -->
<div id="appWrap" style="display:none;height:100vh;">
<aside class="sidebar">
  <div class="sb-head"><div class="sb-logo"><div class="sb-icon">H</div><span class="sb-name">Hamdean</span></div><button class="btn-new" id="btnNew">+</button></div>
  <div class="chat-list" id="chatList"></div>
  <div class="sb-foot" style="display:flex;align-items:center;justify-content:space-between;padding:8px 12px;">Ctrl+N new · v4<button id="btnLogout" style="background:transparent;border:1px solid rgba(255,255,255,.06);border-radius:6px;color:#888;cursor:pointer;font-size:10px;padding:2px 8px;font-family:var(--font);">Logout</button></div>
</aside>
<div class="main">
  <div class="tbar">
    <button class="tbarbtn" id="btnSettings" style="margin-right:auto;">Settings</button>
    <button class="tbarbtn" id="btnMin">_</button><button class="tbarbtn" id="btnMax">[]</button><button class="tbarbtn danger" id="btnClose">X</button>
  </div>
  
<div class="model-bar">
    <button class="model-tag" id="modelTag"><span class="mdot"></span> No model</button>
    <span style="flex:1"></span><button class="mode-tag" id="alTag" onclick="toggleLearnPanel()" style="font-size:10px;">Learn</button>
    <span style="width:6px"></span>
    <button class="mode-tag" id="nnTag" onclick="openNN()" style="font-size:10px;" title="Open 3D Neural Network">NN</button>
    <span style="width:6px"></span>
    <button class="mode-tag" id="skTag" onclick="openSkills()" style="font-size:10px;">Skills</button>
    <span style="width:6px"></span>
    <button class="mode-tag" id="sysTag" onclick="openSys()" style="font-size:10px;">Sys</button>
  </div>
  <div id="learnPanel" style="display:none;background:#0a0a0f;border-bottom:1px solid var(--bd);padding:8px 16px;max-height:180px;overflow-y:auto;font-family:var(--mono);font-size:11px;"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;"><span style="color:#22c55e;font-weight:600;">* 实时动态</span><div style="display:flex;gap:4px;"><button id="alStart" class="mode-tag" style="font-size:10px;border-color:#22c55e;color:#22c55e;" onclick="startAutoLearn()">开始</button><button id="alStop" class="mode-tag" style="font-size:10px;border-color:#ef4444;color:#ef4444;display:none;" onclick="stopAutoLearn()">停止</button></div></div><div id="activityFeed"><div style="color:var(--t3);">点击「开始」启动 AI 自主学习...</div></div></div>
  <div class="msgs" id="msgs"><div class="empty"><div class="empty-icon">*</div><div class="empty-title">Hamdean</div><div class="empty-sub">Add API key to start</div></div></div>
  <div class="input-area">
    <div class="img-preview" id="imgPreview"><img id="imgPreviewSrc"><button class="img-remove" onclick="removeImage()">x</button></div>
    <div class="input-row">
      <textarea id="input" rows="1" placeholder="Message..." autofocus></textarea>
      <button class="img-btn" id="btnImg" title="Upload Image" onclick="document.getElementById('imgInput').click()">+</button>
      <div class="key-wrap"><button class="key-btn" id="btnKey">K</button></div>
      <button class="send-btn" id="btnSend" disabled>^</button>
    </div>
    <input type="file" id="imgInput" accept="image/*" style="display:none" onchange="handleImage(event)">
  </div>
</div>

<script>
// ===== STATE =====
const K='hk',A='ha',P='hp',C='hc',U='hu',T='ht';
function ld(k){try{return JSON.parse(localStorage.getItem(k))}catch{return null}}
function sv(k,v){localStorage.setItem(k,JSON.stringify(v))}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
let keys=ld(K)||[],aid=ld(A)||null,sp=ld(P)||'';
if(sp.includes('张涵')){sp='';sv(P,'')}
let chats=ld(C)||[];
chats=chats.map(c=>{c.msgs=c.msgs.filter(m=>!m.content.includes('张涵'));c._sending=false;c._ac=null;return c}).filter(c=>c.msgs.length>0||c.title!=='New Chat');
if(chats.length===0){chats=[]}sv(C,chats)
let cid=null,editId=null;
let loginMode='login',loginPolling=null;
function ak(){return keys.find(k=>k.id===aid)||null}
function cc(){return chats.find(c=>c.id===cid)||chats[0]}
function initApp(){
  if(!chats.length){let c={id:uid(),title:'New Chat',msgs:[],at:Date.now()};chats=[c];cid=c.id;sv(C,chats)}else cid=chats[0].id;
  // Only init UI if logged in — don't touch DOM when login screen is showing
  if(document.getElementById('loginScreen').style.display==='flex')return;
  rKeys();rChats();rMsgs();$in.focus();
}
marked.setOptions({breaks:true,gfm:true});

// ===== LOGIN =====
function showLogin(){
  // Ensure all overlays/backdrops are hidden before showing login
  closeKD();closeKM();closeSys();document.getElementById('settingsModal').style.display='none';
  document.getElementById('skillsModal').style.display='none';
  var nn=document.getElementById('nnPanel');if(nn)nn.style.display='none';
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('appWrap').style.display='none';
  // Reset to login mode
  loginMode='login';
  document.getElementById('loginEmailView').style.display='block';
  document.getElementById('loginRegView').style.display='none';
  document.getElementById('loginVerifyView').style.display='none';
  document.getElementById('loginError').textContent='';
  document.getElementById('loginEmail').focus();
}
function hideLogin(){
  document.getElementById('loginScreen').style.display='none';
  var a=document.getElementById('appWrap');
  a.style.display='flex';a.style.flex='1';
  // Ensure appWrap is clickable
  a.style.pointerEvents='auto';
  initApp();
}
function loginError(m){let e=document.getElementById('loginError');e.innerHTML=m;e.style.color='#ef4444'}
function togglePw(id,btn){const el=document.getElementById(id);if(el.type==='password'){el.type='text';btn.textContent='O'}else{el.type='password';btn.textContent='*'}}
async function checkSession(){
  const u=ld(U),t=ld(T);
  if(!u||!t)return showLogin();
  try{
    const r=await fetch('/api/auth/session',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:t})});
    const d=await r.json();
    if(d.ok){hideLogin();return}
  }catch(e){}
  sv(U,null);sv(T,null);showLogin();
}
async function doLogin(){
  const email=document.getElementById('loginEmail').value.trim();
  const pw=document.getElementById('loginPw').value;
  if(!email||!pw)return loginError(_t('fillAll'));
  try{
    const r=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password:pw})});
    const d=await r.json();
    if(!d.ok){
      if(d.needVerify){verifyEmail=d.email;showVerifyScreen(d);return;}
      return loginError(d.error||_t('loginFailed'));
    }
    sv(U,d.user);sv(T,d.token);hideLogin();loadMembership();
    document.getElementById('loginEmail').value='';document.getElementById('loginPw').value='';
    document.getElementById('loginError').textContent='';
  }catch(e){loginError(e.message)}
}
function showVerifyScreen(d){
  document.getElementById('loginEmailView').style.display='none';
  document.getElementById('loginRegView').style.display='none';
  document.getElementById('loginVerifyView').style.display='block';
  document.getElementById('verifyEmailText').textContent=verifyEmail;
  document.getElementById('loginTitle').textContent=_t('verifyTitle');
  document.getElementById('loginSubmit').textContent=_t('verifyBtn');
  document.getElementById('loginError').innerHTML=d.message||_t('enterCode');
  document.getElementById('loginError').style.color=d.sent?'#22c55e':'#f0a346';
  document.getElementById('verifyCode').focus();
  loginMode='verify';
}
async function doRegister(){
  const email=document.getElementById('regEmail').value.trim();
  const pw=document.getElementById('regPw').value;
  if(!email||!pw)return loginError(_t('fillAll'));
  if(pw.length<6)return loginError(_t('pwTooShort'));
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email))return loginError(_t('invalidEmail'));
  try{
    const r=await fetch('/api/auth/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password:pw})});
    const d=await r.json();
    if(!d.ok)return loginError(d.error||_t('registerFailed'));
    if(d.needVerify){verifyEmail=email;showVerifyScreen(d);return;}
    sv(U,d.user);sv(T,d.token);hideLogin();loadMembership();
    document.getElementById('regEmail').value='';document.getElementById('regPw').value='';
    document.getElementById('loginError').textContent='';
  }catch(e){loginError(e.message)}
}
let verifyEmail='';
async function doVerify(){
  const code=document.getElementById('verifyCode').value.trim();
  if(!code||code.length!==6)return loginError(_t('enterCode'));
  try{
    const r=await fetch('/api/auth/verify-email',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:verifyEmail,code})});
    const d=await r.json();
    if(!d.ok)return loginError(d.error||_t('verifyFailed'));
    sv(U,d.user);sv(T,d.token);hideLogin();loadMembership();
    document.getElementById('verifyCode').value='';
    document.getElementById('loginError').textContent='';
    verifyEmail='';
  }catch(e){loginError(e.message)}
}
async function doResendCode(){
  if(!verifyEmail)return;
  try{
    const r=await fetch('/api/auth/resend-code',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:verifyEmail})});
    const d=await r.json();
    document.getElementById('loginError').innerHTML=d.message||_t('codeResent');
    document.getElementById('loginError').style.color=d.sent?'#22c55e':'#f0a346';
  }catch(e){loginError(e.message)}
}
function backFromVerify(){
  verifyEmail='';
  document.getElementById('loginVerifyView').style.display='none';
  document.getElementById('loginRegView').style.display='block';
  document.getElementById('loginTitle').textContent=_t('register');
  document.getElementById('loginSubmit').textContent=_t('regBtn');
  document.getElementById('loginError').textContent='';
  loginMode='register';
  document.getElementById('regEmail').focus();
}
function switchToReg(){
  loginMode='register';
  var t=LANG[lang]||LANG.en;
  document.getElementById('loginTitle').textContent=t.register;
  document.getElementById('loginEmailView').style.display='none';
  document.getElementById('loginRegView').style.display='block';
  document.getElementById('loginVerifyView').style.display='none';
  document.getElementById('loginSubmit').textContent=t.regBtn;
  document.getElementById('loginError').textContent='';
  document.getElementById('regEmail').focus();
}
function switchToLogin(){
  loginMode='login';
  var t=LANG[lang]||LANG.en;
  document.getElementById('loginTitle').textContent=t.login;
  document.getElementById('loginEmailView').style.display='block';
  document.getElementById('loginRegView').style.display='none';
  document.getElementById('loginVerifyView').style.display='none';
  document.getElementById('loginSubmit').textContent=t.loginBtn;
  document.getElementById('loginError').textContent='';
  document.getElementById('loginEmail').focus();
}
async function doLogout(){
  const t=ld(T);
  if(t)try{await fetch('/api/auth/logout',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:t})})}catch(e){}
  sv(U,null);sv(T,null);
  chats=[{id:uid(),title:'New Chat',msgs:[],at:Date.now()}];cid=chats[0].id;sv(C,chats);
  rChats();rMsgs();showLogin();
}
function onLoginSubmit(){
  if(loginMode==='verify')doVerify();
  else if(loginMode==='register')doRegister();
  else doLogin();
}

// ===== MEMBERSHIP & AUTO-LEARN =====
let memberState = null;
let learnPanelOpen = false;
let activityPolling = null;

function updateMemberBadge(ms) {
  memberState = ms;
  const b = document.getElementById('memberBadge');
  const al = document.getElementById('alTag');
  if (!ms || ms.tier === 'free') {
    b.style.display = 'inline-block';
    b.style.background = 'rgba(239,68,68,.1)';
    b.style.color = '#ef4444';
    b.style.borderColor = 'rgba(239,68,68,.2)';
    b.textContent = 'Free';
    b.title = 'Click to upgrade to Pro';
    al.style.display = 'none';
  } else if (ms.tier === 'trial') {
    b.style.display = 'inline-block';
    b.style.background = 'rgba(240,163,70,.1)';
    b.style.color = '#f0a346';
    b.style.borderColor = 'rgba(240,163,70,.2)';
    const d = ms.expiresAt ? Math.ceil((ms.expiresAt - Date.now()) / 86400000) : 0;
    b.textContent = 'Trial ' + (d > 0 ? d + 'd' : 'end');
    b.title = 'Trial expires in ' + d + ' days. Click to upgrade.';
    al.style.display = 'inline-block';
  } else if (ms.tier === 'pro') {
    b.style.display = 'inline-block';
    b.style.background = 'rgba(34,197,94,.1)';
    b.style.color = '#22c55e';
    b.style.borderColor = 'rgba(34,197,94,.2)';
    const d = ms.expiresAt ? Math.ceil((ms.expiresAt - Date.now()) / 86400000) : 0;
    b.textContent = 'PRO ' + (d > 0 ? d + 'd' : '');
    b.title = 'Pro member. Expires in ' + d + ' days.';
    al.style.display = 'inline-block';
  }
}

async function loadMembership() {
  const t = ld(T); if (!t) return;
  try {
    const r = await fetch('/api/auth/membership?token=' + t);
    const d = await r.json();
    if (d.ok) updateMemberBadge(d.membership);
  } catch (e) {}
}


function toggleLearnPanel() {
  learnPanelOpen = !learnPanelOpen;
  var lp = document.getElementById('learnPanel');
  if (!lp) { toast(_t('learnPanelNotFound')); return; }
  lp.style.display = learnPanelOpen ? 'block' : 'none';
  if (!learnPanelOpen && activityPolling) { clearInterval(activityPolling); activityPolling = null; }
  if (learnPanelOpen) pollActivity();
}

async function startAutoLearn() {
  const t = ld(T); const a = ak();
  if (!t || !a) { toast(_t('needApiKey')); return; }
  try {
    const r = await fetch('/api/auto-learn/start',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:t,base_url:a.baseUrl,api_key:a.apiKey,model:a.model})});
    const d = await r.json();
    if (!d.ok) { toast(d.error||_t('failed')); return; }
    document.getElementById('alStart').style.display = 'none';
    document.getElementById('alStop').style.display = 'inline-block';
    toast(_t('autoLearnStarted'));
    if (!activityPolling) pollActivity();
  } catch(e) { toast(e.message); }
}

async function stopAutoLearn() {
  try {
    await fetch('/api/auto-learn/stop',{method:'POST'});
    document.getElementById('alStart').style.display = 'inline-block';
    document.getElementById('alStop').style.display = 'none';
    toast(_t('autoLearnStopped'));
  } catch(e) { toast(e.message); }
}

function pollActivity() {
  if (activityPolling) clearInterval(activityPolling);
  const t = ld(T); if (!t) return;
  activityPolling = setInterval(async () => {
    try {
      const r = await fetch('/api/auto-learn/activity?token=' + t);
      const d = await r.json();
      if (!d.running && activityPolling) { clearInterval(activityPolling); activityPolling = null; }
      if (!d.activities || !d.activities.length) return;
      renderActivity(d.activities);
      document.getElementById('alStart').style.display = d.running ? 'none' : 'inline-block';
      document.getElementById('alStop').style.display = d.running ? 'inline-block' : 'none';
    } catch(e) {}
  }, 3000);
  setTimeout(() => { if (activityPolling) pollActivity(); }, 3000);
}

function renderActivity(activities) {
  const feed = document.getElementById('activityFeed');
  const colors = {info:'#8e8e9c',discovery:'#f0a346',action:'#22c55e',error:'#ef4444'};
  feed.innerHTML = activities.slice(0, 30).map(a => {
    const t = new Date(a.time).toLocaleTimeString();
    return '<div class="activity-line"><span class="al-dot" style="background:'+(colors[a.type]||'#888')+';"></span><span class="al-time">'+t+'</span><span class="al-action">['+a.action+']</span><span>'+a.detail+'</span></div>';
  }).join('');
}

// ===== DOM =====
const $cl=document.getElementById('chatList'),$ms=document.getElementById('msgs'),$in=document.getElementById('input'),$sb=document.getElementById('btnSend'),$mt=document.getElementById('modelTag'),$kd=document.getElementById('keyDrop'),$kdb=document.getElementById('keyDropBackdrop'),$kl=document.getElementById('keyList'),$bk=document.getElementById('btnKey');

function esc(s){let d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
function scrollB(){requestAnimationFrame(()=>{$ms.scrollTop=$ms.scrollHeight})}
function rChats(){$cl.innerHTML=chats.map(c=>`<button class="chat-item${c.id===cid?' on':''}" data-cid="${c.id}"><span class="dot"></span><span class="txt">${esc(c.title)}</span><button class="del" data-del="${c.id}">x</button></button>`).join('')}
function rModel(){let k=ak();if(k){$mt.className='model-tag active';$mt.innerHTML='<span class="mdot"></span>'+esc(k.name)+' - '+esc(k.model)}else{$mt.className='model-tag';$mt.innerHTML='<span class="mdot"></span>No model'}}
function rMsgs(){let c=cc();if(!c||!c.msgs.length){$ms.innerHTML='<div class="empty"><div class="empty-icon">*</div><div class="empty-title">Hamdean</div><div class="empty-sub">'+_t('emptyReady')+'</div></div>';return}$ms.innerHTML='';c.msgs.forEach(m=>$ms.appendChild(msgEl(m)));scrollB()}
function msgEl(m){let d=document.createElement('div');d.className='msg '+m.role;let av=m.role==='user'?'U':m.role==='system'?'S':'H',rl=m.role==='user'?'You':m.role==='system'?'Sys':(ak()?.name||'H');let content=m.content||'',imgHtml='';if(Array.isArray(m.content)){let txt=m.content.filter(p=>p.type==='text').map(p=>p.text).join(' ');let imgs=m.content.filter(p=>p.type==='image_url');content=txt;if(imgs.length)imgHtml='<img src="'+esc(imgs[0].image_url.url)+'" style="max-width:200px;max-height:150px;border-radius:8px;display:block;margin-bottom:6px;">'}let html=m.role==='assistant'?marked.parse(content):esc(content);d.innerHTML='<div class="msg-av">'+av+'</div><div class="msg-bd"><div class="msg-role">'+rl+'</div><div class="msg-content">'+imgHtml+(m.role==='user'||m.role==='system'?esc(content):addCp(html))+'</div></div>';d.setAttribute('data-mid',m.id);return d}
function addCp(h){return h.replace(/<pre><code/g,'<pre><button class="copy-btn" onclick="cp(this)">Copy</button><code')}

// ===== KEYS =====
const PRESETS={deepseek:{url:'https://api.deepseek.com/v1',model:'deepseek-v4-pro'},openai:{url:'https://api.openai.com/v1',model:'gpt-4o'},groq:{url:'https://api.groq.com/openai/v1',model:'llama-3.3-70b'}};
function setPreset(p){if(PRESETS[p]){document.getElementById('kUrl').value=PRESETS[p].url;document.getElementById('kModel').value=PRESETS[p].model}}
function rKeys(){let a=ak();$bk.classList.toggle('has-key',!!a);$sb.disabled=!a||sending||!$in.value.trim();if(!keys.length){$kl.innerHTML='<div style="padding:20px;text-align:center;font-size:11px;color:var(--t3);">'+_t('noKeys')+'</div>';return}$kl.innerHTML=keys.map(k=>`<div class="key-item${k.id===aid?' sel':''}" data-kid="${k.id}" style="display:flex;align-items:center;gap:8px;padding:9px 14px;cursor:pointer;"><span class="key-item-dot"></span><span class="key-item-info" style="flex:1;" onclick="event.stopPropagation();selKey('${k.id}')"><span class="key-item-name">${esc(k.name)}</span><span class="key-item-model">${esc(k.model)}</span></span><button onclick="event.stopPropagation();openKM('${k.id}')" style="background:none;border:none;color:var(--t3);cursor:pointer;font-size:11px;padding:2px 4px;" title="Edit">*</button><button onclick="event.stopPropagation();editId='${k.id}';delKey()" style="background:none;border:none;color:#ef4444;cursor:pointer;font-size:11px;padding:2px 4px;" title="Delete">x</button></div>`).join('');rModel()}
function selKey(id){aid=id;sv(A,id);rKeys();rMsgs();closeKD()}

// ===== CHAT =====
function runningChat(){return chats.find(c=>c._sending)}
function abortChat(c){if(!c||!c._ac)return;try{c._ac.abort('user')}catch{}c._sending=false;c._ac=null}
function newChat(){
  let running = runningChat();
  if(running) abortChat(running);
  let c={id:uid(),title:'New Chat',msgs:[],at:Date.now(),_sending:false,_ac:null};
  chats.unshift(c);cid=c.id;sv(C,chats);rChats();rMsgs();$in.focus();
  updateSendBtn();
}
function swChat(id){
  if(id===cid)return;
  let running = runningChat();
  if(running) abortChat(running);
  cid=id;rChats();rMsgs();$in.focus();
  updateSendBtn();
}
function delChat(id){if(chats.length<=1)return;let wasRunning=chats.find(c=>c.id===id)?._sending;if(wasRunning)abortChat(chats.find(c=>c.id===id));chats=chats.filter(c=>c.id!==id);if(cid===id){cid=chats[0].id;rMsgs()}sv(C,chats);rChats();updateSendBtn()}
function updateSendBtn(){
  let running = runningChat();
  $sb.classList.toggle('running', !!running);
  $sb.textContent = running ? '#' : '^';
  $sb.disabled = running ? false : (!ak() || !$in.value.trim());
}
async function send(forceStop){
  // If a chat is running and user clicks send (forceStop), abort it
  let running = runningChat();
  if(forceStop && running){
    abortChat(running);
    // Mark the aborted message
    let lastMsg = running.msgs[running.msgs.length-1];
    if(lastMsg && lastMsg.streaming){lastMsg.streaming=false;lastMsg.content='[中断]'}
    sv(C,chats);
    if(cid===running.id)rMsgs();
    updateSendBtn();
    return;
  }
  if(running) return; // another chat is running, ignore
  let txt=$in.value.trim(),a=ak();if(!txt||!a)return;
  let c=cc();if(!c)return;
  // Abort this chat's previous stream if somehow still running
  if(c._sending && c._ac){abortChat(c);await new Promise(r=>setTimeout(r,60))}
  let userContent=imageBase64?[{type:'text',text:txt},{type:'image_url',image_url:{url:imageBase64}}]:txt;
  let um={id:'u_'+uid(),role:'user',content:userContent,at:Date.now()};c.msgs.push(um);
  if(c.title==='New Chat')c.title=txt.slice(0,24)+(txt.length>24?'...':'');
  sv(C,chats);$in.value='';$in.style.height='auto';
  let am={id:'a_'+uid(),role:'assistant',content:'▊',at:Date.now(),streaming:true};c.msgs.push(am);
  $ms.appendChild(msgEl(um));$ms.appendChild(msgEl(am));scrollB();rChats();removeImage();
  let sel=document.createElement('div');sel.className='status';sel.id='toolStatus';sel.innerHTML='<span class="status-dot"></span> 分析中...';$ms.appendChild(sel);scrollB();
  c._sending=true;c._ac=new AbortController();updateSendBtn();
  let myChatId=c.id, toolCount=0, autoRound=0;
  try{
    let apiMs=c.msgs.filter(m=>!m.streaming).map(m=>({role:m.role,content:m.content}));
    let resp=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({base_url:a.baseUrl,api_key:a.apiKey,model:a.model,messages:apiMs,system_prompt:sp||undefined,stream:true}),signal:c._ac.signal});
    if(!resp.ok){let d=await resp.json().catch(()=>({}));throw new Error(d.error||'请求失败 '+resp.status)}
    if(!resp.headers.get('Content-Type')?.includes('text/event-stream')){let d=await resp.json();am.content=d.content||d.error||'(空)';am.streaming=false;sv(C,chats);rMsgs();scrollB();return}
    let reader=resp.body.getReader(),decoder=new TextDecoder(),buffer='';
    while(true){
      if(c.id !== cid) break; // switched away — stop processing
      let{value,done}=await reader.read();if(done)break;
      if(c.id !== cid) break; // re-check after await
      buffer+=decoder.decode(value,{stream:true});
      let lines=buffer.split('\n');buffer=lines.pop()||'';
      for(let line of lines){
        if(!line.startsWith('data: '))continue;
        try{
          let evt=JSON.parse(line.slice(6));
          if(evt.type==='status'){
            let st=document.getElementById('toolStatus');if(st)st.innerHTML='<span class="status-dot"></span> '+esc(evt.text);
          }else if(evt.type==='tool'){
            toolCount++;
            let st=document.getElementById('toolStatus');if(st)st.innerHTML='<span class="status-dot" style="background:#22c55e;"></span> 工具: '+esc(evt.name)+' ('+toolCount+')';
            let tm={id:'t_'+uid(),role:'system',content:'[工具: '+evt.name+']\n'+esc(evt.args||'')+'\n→ '+esc((evt.result||'').slice(0,500)),at:Date.now()};
            c.msgs.splice(c.msgs.length-1,0,tm);if(c.id===cid)$ms.insertBefore(msgEl(tm),$ms.lastElementChild);
          }else if(evt.type==='auto_continue'){
            autoRound=evt.round;
            let st=document.getElementById('toolStatus');if(st)st.innerHTML='<span class="status-dot" style="background:#f0a346;"></span> 自动继续 第'+autoRound+'/'+evt.total+'轮...';
          }else if(evt.type==='done'){
            am.content=evt.content||'(空)';am.streaming=false;
            if(evt.tools&&evt.tools.length){
              let st=document.getElementById('toolStatus');if(st)st.innerHTML='<span class="status-dot" style="background:#22c55e;"></span> 完成 · '+evt.tools.length+'个工具 · '+(autoRound?autoRound+'轮':'');
            }
          }else if(evt.type==='error'){
            am.content='错误: '+esc(evt.error);am.streaming=false;
          }
        }catch(e){}
      }
    }
    am.content=am.content||'(空)';am.streaming=false;sv(C,chats);if(c.id===cid){rMsgs();scrollB()}
    let el=document.querySelector('[data-mid="'+am.id+'"] .msg-content');if(el)el.innerHTML=addCp(marked.parse(am.content||''));
    setTimeout(()=>{document.querySelectorAll('pre code').forEach(b=>{try{hljs.highlightElement(b)}catch(e){}})},50);
  }catch(err){
    console.error('Send error:',err);
    let abortReason = c._ac?.signal?.reason || '';
    if(err.name==='AbortError'){
      am.content = (abortReason==='timeout'||abortReason==='user-timeout') ? '[超时]' : '[中断]';
    } else {
      am.content='错误: '+err.message;
    }
    am.streaming=false;sv(C,chats);if(c.id===cid){rMsgs();scrollB()}
  }finally{
    c._sending=false;c._ac=null;updateSendBtn();$in.focus();
    if(sel&&sel.parentNode)sel.remove()
  }
}

      const col=n.color?parseInt(n.color.replace('#',''),16):(colors[n.group]||0x888888);
      const geo=new three.SphereGeometry(sz,32,32);
      const mat=new three.MeshStandardMaterial({color:col,roughness:0.3,metalness:0.4,emissive:col,emissiveIntensity:0.5});
      const mesh=new three.Mesh(geo,mat);
      mesh.userData={oR,spd,angle:Math.random()*Math.PI*2,label:n.label,val:n.val};
      nnScene.add(mesh);nnObjects.push(mesh);
      // Label sprite
      const cv2=document.createElement('canvas');cv2.width=128;cv2.height=32;
      const ctx=cv2.getContext('2d');ctx.fillStyle='#fff';ctx.font='14px Inter,sans-serif';ctx.textAlign='center';ctx.fillText(n.label,64,20);
      const tex=new three.CanvasTexture(cv2);tex.minFilter=three.LinearFilter;
      const smat=new three.SpriteMaterial({map:tex,transparent:true,depthWrite:false});
      const sprite=new three.Sprite(smat);sprite.scale.set(3,1,1);sprite.userData={label:true,parent:mesh};mesh.add(sprite);
    });
  }catch(e){console.log('NN err:',e)}

  // Raycaster for hover tooltip
  const raycaster=new three.Raycaster();raycaster.far=50;
  const mouse=new three.Vector2();
  const tooltip=document.createElement('div');
  tooltip.style.cssText='position:absolute;display:none;background:rgba(10,10,30,.95);border:1px solid rgba(240,163,70,.5);border-radius:8px;padding:8px 12px;color:#fff;font-family:var(--font);font-size:11px;pointer-events:none;z-index:20;white-space:nowrap;';
  document.getElementById('nnPanel').appendChild(tooltip);
  cv.addEventListener('mousemove',ev=>{
    const r=cv.getBoundingClientRect();
    mouse.x=((ev.clientX-r.left)/r.width)*2-1;
    mouse.y=-((ev.clientY-r.top)/r.height)*2+1;
    raycaster.setFromCamera(mouse,nnCamera);
    const hits=raycaster.intersectObjects(nnObjects.filter(o=>o.userData&&o.userData.label));
    if(hits.length>0){
      const d=hits[0].object.userData;
      tooltip.style.display='block';
      tooltip.style.left=(ev.clientX-r.left+16)+'px';
      tooltip.style.top=(ev.clientY-r.top-8)+'px';
      const gnames={core:'核心',topic:'知识领域',skill:'技能',interest:'兴趣'};
      tooltip.innerHTML='<b>'+d.label+'</b><br><span style=\"color:#aaa;\">'+(gnames[d.group]||d.group||'')+'</span> · 权重:'+(d.val||0).toFixed(1);
      cv.style.cursor='pointer';
    }else{tooltip.style.display='none';cv.style.cursor='grab'}
  });

  function anim(t){
    requestAnimationFrame(anim);if(!nnScene)return;
    nnControls.update();glow.rotation.y+=0.0015;glow.rotation.x+=0.0008;
    if(glow.material.uniforms)glow.material.uniforms.uTime.value=t*0.001;
    sun.rotation.y+=0.002;
    nnObjects.forEach(o=>{
      if(!o.userData||!o.userData.oR)return;
      o.userData.angle+=o.userData.spd*0.004;
      const a=o.userData.angle,r=o.userData.oR;
      o.position.set(Math.cos(a)*r*0.65,Math.sin(a)*r*0.45,Math.cos(a+1)*r*0.25);
      o.rotation.y+=0.01;
    });
    nnRenderer.render(nnScene,nnCamera);
  }
  requestAnimationFrame(anim);
  window.addEventListener('resize',()=>{if(!nnRenderer)return;const w=cv.parentElement.clientWidth,h=cv.parentElement.clientHeight;nnCamera.aspect=w/h;nnCamera.updateProjectionMatrix();nnRenderer.setSize(w,h)});
}
